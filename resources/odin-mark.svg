<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
<title>Odin brand mark - Huginn and Muninn (Scallop x Tomoe)</title>
<desc>Twin ravens circling within double rings. MARK ONLY: no background field.
The reusable, themeable brand asset; the launcher's cream plate rendition lives
only in the icon build inputs (resources/icon-*.svg), never here.
Three color custom properties (baked fallbacks in parentheses):
--logo-ink (#1F2125) raven 1 body plus its two rings;
--logo-slate (#35455F) raven 2 body plus its two rings;
--logo-field (transparent) the carved plumage / eye / seam detail.
The carving is field-colored by construction: the detail strokes are painted
over the solid ravens in --logo-field so they read as cut-outs of the surface
behind the mark. There is no real punch-out, so a consumer MUST set --logo-field
to the color of the surface the mark sits on for the carving to appear. Unset,
the field is transparent and the ravens read as solid silhouettes. Never bake
the launcher's cream field color into this file.</desc>
